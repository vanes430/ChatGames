#Use <center> in LIST messages to center the messages, the lines with this will be centered!

  
#############################
##    CHATGAME MESSAGES    ##
#############################

#YOU CAN USE "%display_name%" AS A REPLACEMENT FOR %player% IN correct_message FOR ALL GAMES.
unscramble:
    gameStartAnnouncement: 
      - ''
      - '<center>&r✓ ✯ %prefix%&r ✯ ✓'
      - ''
      - '<center>&fAnda memiliki &e%timeToGuess% detik &funtuk &dmenyusun kata&f: `&b%word%&f`'
      - ''
    correct_message: 
      - ''
      - '<center>&r✓ ✯ %prefix% &r✯ ✓'
      - ''
      - '<center>&a%player% &7telah menyusun kata `&e%correct_answer%&7` dengan benar (&c%time%s&7) dan mendapatkan hadiah!'
      - ''
    time_expired_message:
      - ''
      - '<center>&r✓ ✯ %prefix%&r ✯ ✓'
      - ''
      - '<center>&fWaktu &e%timeToGuess% detik &ctelah berlalu! &fPermainan menyusun kata telah berakhir!'
      - '<center>Jawaban yang benar adalah &e%correct_answer%&f!'
      - ''

